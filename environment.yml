name: agripulse_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - earthengine-api
  - geemap
  - rasterio=1.3.*
  - geopandas=0.14.*
  - xarray=2024.*
  - rioxarray
  - scipy
  - fastparquet
  - jupyterlab
  - matplotlib
  - seaborn
  - pip
  - pip:
    - fastapi
    - uvicorn
    - streamlit